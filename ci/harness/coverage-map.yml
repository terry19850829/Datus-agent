schema_version: 1
source:
  docs_navigation: mkdocs.yml
  definition: >
    A core flow is a documented user-facing entry point, data/knowledge lifecycle,
    adapter contract, or release-confidence operation exposed from docs/.
layers:
  pr_acceptance:
    description: Fast deterministic PR signal for documented core flows.
  merge_queue:
    description: Deterministic pre-merge signal on the merge-group commit.
  nightly:
    description: Full product and integration signal with real services, adapters, and provider health.
  weekly_benchmark:
    description: Quality and retrieval signal for benchmarked product scenarios.
gap_issue: https://github.com/Datus-ai/Datus-agent/issues/910
docs_coverage_policy:
  description: >
    Every page in the mkdocs nav must either be referenced by a flow's docs: list
    or be excluded here with a rationale. validate_coverage_map.py fails when a nav
    page is neither, so new documented user-facing surfaces cannot be added without
    a conscious coverage decision.
  exclude:
    - path: docs/index.md
      reason: Documentation site landing page, not a user-facing flow.
    - path: docs/develop/README.md
      reason: Contributor/development guide, not a product flow.
    - path: docs/release_notes.md
      reason: Release notes, not a user-facing flow.
    - path: docs/configuration/introduction.md
      reason: Configuration section overview, not a discrete flow.
    - path: docs/knowledge_base/introduction.md
      reason: Knowledge base section overview, not a discrete flow.
    - path: docs/metricflow/introduction.md
      reason: MetricFlow section overview; the semantic layer flow owns the concrete pages.
flow_groups:
  onboarding:
    description: First-run and documented bootstrap flows.
    flows:
      - id: onboarding.quickstart
        title: Quickstart CLI chat and workspace setup
        priority: p0
        quality_sensitive: false
        docs:
          - docs/getting_started/Quickstart.md
          - docs/cli/chat_command.md
          - docs/cli/reference.md
        entrypoints:
          - "CLI: datus"
          - "CLI slash commands: /datasource, /model, /init"
        contracts:
          - Documented REPL commands stay routable through the shared command dispatcher.
          - Quickstart workspace initialization remains available from the CLI.
        coverage:
          pr_acceptance:
            status: covered
            nodeids:
              - tests/unit_tests/cli/test_core_entrypoint_acceptance.py::test_quickstart_documented_repl_entrypoints_stay_routable
              - tests/unit_tests/cli/test_interactive_init.py
          merge_queue:
            status: covered
            nodeids:
              - tests/unit_tests/cli/test_core_entrypoint_acceptance.py::test_quickstart_documented_repl_entrypoints_stay_routable
              - tests/unit_tests/cli/test_interactive_init.py
          nightly:
            status: covered
            nodeids:
              - tests/integration/cli/test_quickstart_smoke.py
              - tests/integration/cli/test_quickstart_smoke.py::TestQuickstartChatInitialization::test_chat_node_exposes_sql_tools_on_quickstart_datasource
              - tests/integration/cli/test_quickstart_smoke.py::TestQuickstartChatSmoke::test_quickstart_natural_language_question_answered_with_sql
            notes: >
              Nightly smoke exercises the documented quickstart chat path (natural-language
              question answered with real-LLM SQL generation on a local datasource). Full
              guided tutorial replay remains tracked by the gap issue.
          weekly_benchmark:
            status: not_applicable
        gaps:
          - https://github.com/Datus-ai/Datus-agent/issues/893

      - id: onboarding.bootstrap_bi
        title: Dashboard copilot and bootstrap BI
        priority: p0
        quality_sensitive: true
        docs:
          - docs/getting_started/dashboard_copilot.md
          - docs/getting_started/data_engineering_quickstart.md
          - docs/configuration/bi_platforms.md
        entrypoints:
          - "CLI: datus bootstrap-bi"
          - "CLI chat: dashboard generation subagent"
        contracts:
          - Bootstrap extracts semantic model, metrics, and reference SQL from documented BI context.
          - Superset and Grafana integrations remain usable through BI tool contracts.
        coverage:
          pr_acceptance:
            status: covered
            nodeids:
              - tests/unit_tests/cli/test_core_entrypoint_acceptance.py::test_bootstrap_bi_extracts_context_and_hands_it_to_save_stream
              - tests/unit_tests/tools/func_tool/test_bi_tools.py
          merge_queue:
            status: covered
            nodeids:
              - tests/unit_tests/cli/test_core_entrypoint_acceptance.py::test_bootstrap_bi_extracts_context_and_hands_it_to_save_stream
              - tests/unit_tests/tools/func_tool/test_bi_tools.py
          nightly:
            status: covered
            nodeids:
              - tests/integration/agent/test_gen_dashboard_agentic.py
              - tests/integration/tools/test_bi_dashboard.py
              - tests/integration/tools/test_bi_grafana.py
          weekly_benchmark:
            status: not_applicable
            notes: >
              Scoped out: the weekly benchmark measures query/retrieval quality (Baisheng),
              not BI bootstrap artifact quality. bootstrap-bi is validated by nightly, not by
              weekly benchmark, until a deliberate artifact-quality scoring design exists (#921).
        gaps:
          - https://github.com/Datus-ai/Datus-agent/issues/910

      - id: onboarding.contextual_data_engineering
        title: Contextual data engineering bootstrap
        priority: p0
        quality_sensitive: true
        docs:
          - docs/getting_started/contextual_data_engineering.md
          - docs/knowledge_base/metadata.md
          - docs/knowledge_base/reference_sql.md
        entrypoints:
          - "CLI: datus bootstrap"
          - "CLI chat: context-aware SQL workflow"
        contracts:
          - Local context bootstrap produces searchable metadata, semantic, knowledge, and SQL context.
          - Query-time context retrieval can use historical SQL and knowledge artifacts.
        coverage:
          pr_acceptance:
            status: covered
            nodeids:
              - tests/unit_tests/cli/test_core_entrypoint_acceptance.py::test_bootstrap_semantic_model_and_metrics_streams_orchestrate_fake_helpers
              - tests/integration/storage/test_storage_layout.py
          merge_queue:
            status: covered
            nodeids:
              - tests/unit_tests/cli/test_core_entrypoint_acceptance.py::test_bootstrap_semantic_model_and_metrics_streams_orchestrate_fake_helpers
              - tests/integration/storage/test_storage_layout.py
          nightly:
            status: covered
            nodeids:
              - tests/integration/agent/test_gen_semantic_model_agentic.py
              - tests/integration/agent/test_gen_metrics_agentic.py
              - tests/integration/agent/test_sql_summary_agentic.py
          weekly_benchmark:
            status: covered
            notes: datus-benchmark Baisheng weekly scenario exercises query-time context use.
        gaps:
          - https://github.com/Datus-ai/Datus-agent/issues/856

