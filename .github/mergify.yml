commands_restrictions:
  backport:
    conditions:
      - or:
        - sender-permission>=read
        - sender=github-actions[bot]

  rebase:
    conditions:
      - or:
        - sender-permission>=read
        - sender=github-actions[bot]

# Defaults apply to both file-defined rules and `@Mergifyio backport ...`
# commands. Override the backport PR body so it carries only a reference to
# the source PR instead of a verbatim copy of the original description.
defaults:
  actions:
    backport:
      body: |
        Automated backport of #{{ number }} to `{{ destination_branch }}`.

pull_request_rules:
  - name: assign PRs with the pr author
    conditions:
      - -merged
    actions:
      assign:
        add_users:
          - "{{author}}"

  - name: close pr when conflict
    conditions:
      - label=conflicts
    actions:
      close:
        message:
          "@{{author}}: Conflict detected, please resolve the conflict and resubmit the PR"

# Backport is triggered by a `@Mergifyio backport <branch>` comment posted by
# github-actions[bot] after merge — see .github/workflows/trigger-backport-on-merge.yml.
# No per-branch rules needed; new release/* branches require zero changes here.
