name: "Coverage Check"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  coverage:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || github.event.merge_group.base_ref || github.ref_name }}"
          BASE_REF="${BASE_REF#refs/heads/}"
          git fetch origin "$BASE_REF:refs/remotes/origin/$BASE_REF"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install --upgrade --no-cache-dir \
            "datus-metricflow @ https://github.com/Datus-ai/metricflow/archive/95fe9271d2fbe1e12797595b2d841c84c1ce6f3d.tar.gz" \
            "datus-semantic-metricflow @ https://github.com/Datus-ai/datus-semantic-adapter/archive/002b93e39b906f42ecf9bc513ace3c1594139462.tar.gz#subdirectory=datus-semantic-metricflow"
          pip install pytest-cov 'chardet<6' diff-cover packaging

      - name: Check release metadata
        run: python3 ci/check_release_readiness.py

      - name: Validate harness coverage map
        run: |
          set +e
          python3 ci/harness/validate_coverage_map.py \
            --strict \
            --report-json ci/harness/coverage-map-report.json \
            --report-md ci/harness/coverage-map-report.md
          validation_exit=$?
          set -e
          if [ -f ci/harness/coverage-map-report.md ]; then
            cat ci/harness/coverage-map-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$validation_exit"

      - name: Setup config file
        run: |
          cp /home/datus_ci/ci_template/agent.yml conf/agent.yml
          cp /home/datus_ci/ci_template/ci.env .env

      - name: Restore tracked test config
        run: git restore --source=HEAD --worktree --staged tests/conf/agent.yml

      - name: Isolate test data directory
        run: |
          DATUS_TEST_HOME="${GITHUB_WORKSPACE}/.datus_test_data"
          echo "DATUS_TEST_HOME=$DATUS_TEST_HOME" >> "$GITHUB_ENV"
          sed -i "s|home: .datus_test_data|home: $DATUS_TEST_HOME|g" tests/conf/agent.yml
          sed -i "s|project_root: .datus_test_data/workspace|project_root: $DATUS_TEST_HOME/workspace|g" tests/conf/agent.yml

      - name: Load environment variables
        run: |
          echo "Loading environment variables from .env file..."
          # Export all variables from .env to GITHUB_ENV so they persist across steps
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip empty lines and comments
            if [[ ! -z "$line" && ! "$line" =~ ^[[:space:]]*# ]]; then
              # Remove any surrounding whitespace and export to GITHUB_ENV
              var_name=$(echo "$line" | cut -d'=' -f1)
              var_value=$(echo "$line" | cut -d'=' -f2-)
              echo "::add-mask::$var_value"
              echo "Loading variable: $var_name"
              echo "$line" >> "$GITHUB_ENV"
            fi
          done < .env
          echo "Environment variables loaded successfully"

      - name: Run tests and extract coverage
        id: metrics
        env:
          DATUS_CI_PYTEST_BASETEMP: ${{ runner.temp }}/datus-agent-pytest-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || github.event.merge_group.base_ref || github.ref_name }}"
          BASE_REF="${BASE_REF#refs/heads/}"
          python3 ci/run-pr-tests.py "$BASE_REF"

      - name: Cleanup pytest temp
        if: always()
        env:
          DATUS_CI_PYTEST_BASETEMP: ${{ runner.temp }}/datus-agent-pytest-${{ github.run_id }}-${{ github.run_attempt }}
          RUNNER_TEMP_ROOT: ${{ runner.temp }}
        run: |
          if [ -z "$DATUS_CI_PYTEST_BASETEMP" ]; then
            exit 0
          fi
          target="$(realpath -m "$DATUS_CI_PYTEST_BASETEMP")"
          runner_temp="$(realpath -m "$RUNNER_TEMP_ROOT")"
          home_dir="$(realpath -m "$HOME")"
          workspace="$(realpath -m "$GITHUB_WORKSPACE")"
          case "$target" in
            "$runner_temp"/*) ;;
            *) echo "Refusing to remove unsafe pytest temp: $target"; exit 0 ;;
          esac
          if [ "$target" = "/" ] || [ "$target" = "$runner_temp" ] || [ "$target" = "$home_dir" ] || [ "$target" = "$workspace" ]; then
            echo "Refusing to remove unsafe pytest temp: $target"
            exit 0
          fi
          rm -rf "$target"

      - name: Post coverage comment
        if: ${{ always() && github.event_name == 'pull_request_target' && steps.metrics.outcome != 'cancelled' }}
        uses: actions/github-script@v7
        env:
          METRIC_OVERALL: ${{ steps.metrics.outputs.overall }}
          METRIC_DIFF: ${{ steps.metrics.outputs.diff }}
          METRIC_TEST_OUTCOME: ${{ steps.metrics.outputs.test_outcome }}
          METRIC_TEST_TOTAL: ${{ steps.metrics.outputs.test_total }}
          METRIC_TEST_PASSED: ${{ steps.metrics.outputs.test_passed }}
          METRIC_TEST_FAILED: ${{ steps.metrics.outputs.test_failed }}
          METRIC_TEST_SKIPPED: ${{ steps.metrics.outputs.test_skipped }}
        with:
          script: |
            const script = require('./ci/post-coverage-comment.js');
            await script({ github, context, core });

      - name: Check coverage thresholds
        if: always() && steps.metrics.outcome != 'cancelled'
        run: |
          python3 -c "
          import sys
          diff = float('${{ steps.metrics.outputs.diff }}')
          test_outcome = '${{ steps.metrics.outputs.test_outcome }}'
          failed = False
          if diff < 80:
              print(f'::error::Diff coverage {diff}% is below the 80% threshold')
              failed = True
          if test_outcome != 'success':
              print('::error::PR acceptance and impacted unit tests did not pass')
              failed = True
          sys.exit(1 if failed else 0)
          "
