name: "Prepare Release PR"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New canonical datus-agent version, for example 0.2.7 or 0.3.0rc1"
        required: true
        type: string
      update_adapter_bounds:
        description: "Update adapter core lower bounds to latest PyPI releases"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-pr-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: pip install packaging

      - name: Prepare release metadata
        run: |
          args=(--version "${{ inputs.version }}")
          if [[ "${{ inputs.update_adapter_bounds }}" == "true" ]]; then
            args+=(--update-adapter-bounds)
          else
            args+=(--no-update-adapter-bounds)
          fi
          python3 ci/prepare_release.py "${args[@]}"

      - name: Check release readiness
        run: |
          python3 ci/check_release_readiness.py \
            --expected-version "${{ inputs.version }}" \
            --check-tag-available \
            --check-adapter-latest

      - name: Check generated diff
        run: git diff --check

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          UPDATE_ADAPTER_BOUNDS: ${{ inputs.update_adapter_bounds }}
        run: |
          set -euo pipefail

          branch="release/${VERSION}"
          title="[Tool] Prepare datus-agent ${VERSION}"
          body_file="$(mktemp)"
          cat > "${body_file}" <<EOF
          ## Why

          Prepare datus-agent ${VERSION} with consistent source version metadata and adapter dependency bounds.

          ## Solution

          - update source version metadata in pyproject.toml and datus/__init__.py
          - update adapter core dependency lower bounds to latest PyPI releases: ${UPDATE_ADAPTER_BOUNDS}

          ## Test Cases

          - generated by \`python3 ci/prepare_release.py --version ${VERSION}\`
          - validated by \`python3 ci/check_release_readiness.py --expected-version ${VERSION} --check-tag-available --check-adapter-latest\`
          - validated by \`git diff --check\`

          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -B "${branch}"
          git add pyproject.toml requirements.txt datus/__init__.py
          git commit -m "chore: prepare datus-agent ${VERSION} release"
          git push --force-with-lease origin "${branch}"

          if gh pr view "${branch}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh pr edit "${branch}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --body-file "${body_file}"
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${branch}" \
              --title "${title}" \
              --body-file "${body_file}"
          fi
